          const cl=allClients.find(c=>String(c.id)===String(f.client_id))||{};
          return `<tr>
            <td><span style="font-weight:700;font-family:var(--mono);font-size:12px;color:var(--brand-2)">${f.numero}</span></td>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="av" style="width:26px;height:26px;font-size:10px">${(cl.prenom||'?')[0]}${(cl.nom||'?')[0]}</div><div><div style="font-size:13px;font-weight:600">${cl.prenom||'?'} ${cl.nom||''}</div><div style="font-size:11px;color:var(--text3)">${cl.entreprise||''}</div></div></div></td>
            <td style="font-size:13px">${fmtMAD(f.total_ht)}</td>
            <td style="font-size:12px;color:var(--text2)">${f.tva}%</td>
            <td style="font-weight:700;color:var(--brand-2)">${fmtMAD(f.total_ttc)}</td>
            <td style="font-size:11.5px;color:var(--text3)">${fmtDate(f.date_echeance)}</td>
            <td>${badgeSt(f.statut)}</td>
            <td><div style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm btn-icon" title="Imprimer PDF" onclick="printFacturePDF('${f.id}')">🖨️</button>
              <button class="btn btn-ghost btn-sm btn-icon" onclick="openMFacture('${f.id}')">✏️</button>
              <button class="btn btn-danger btn-sm btn-icon" onclick="delFacture('${f.id}')">🗑️</button>
            </div></td>
          </tr>`;
        }).join('')}
      </table>` : emptyState('💰','Aucune facture','Créez votre première facture.')}
    </div></div>`;
}

// Facture lignes state
let _factureLignes = [];

function addFactureLigne(desc='', qte=1, prix=0) {
  _factureLignes.push({ desc, qte, prix });
  renderFactureLignes();
}

function removeFactureLigne(i) {
  _factureLignes.splice(i,1);
  renderFactureLignes();
}

function renderFactureLignes() {
  const body = document.getElementById('facture-lignes-body');
  if (!body) return;
  body.innerHTML = _factureLignes.map((l,i) => `
    <div class="facture-ligne-row">
      <input placeholder="Description..." value="${l.desc}" oninput="_factureLignes[${i}].desc=this.value">
      <input type="number" value="${l.qte}" min="0.01" step="0.01" oninput="_factureLignes[${i}].qte=parseFloat(this.value)||0;updateFactureTotal()">
      <input type="number" value="${l.prix}" min="0" step="0.01" oninput="_factureLignes[${i}].prix=parseFloat(this.value)||0;updateFactureTotal()">
      <span style="font-size:13px;font-weight:700;color:var(--brand-2)">${fmtMAD(l.qte*l.prix)}</span>
      <button class="btn btn-danger btn-icon btn-sm" onclick="removeFactureLigne(${i})">✕</button>
    </div>`).join('');
  updateFactureTotal();
}

function updateFactureTotal() {
  const tva = parseFloat(document.getElementById('mf-tva')?.value||20);
  const ht  = _factureLignes.reduce((s,l)=>s+(l.qte*l.prix),0);
  const ttc = ht*(1+tva/100);
  const el  = id => document.getElementById(id);
  if(el('ft-ht'))     el('ft-ht').textContent      = fmtMAD(ht);
  if(el('ft-tva-val')) el('ft-tva-val').textContent = fmtMAD(ht*tva/100);
  if(el('ft-ttc'))    el('ft-ttc').textContent      = fmtMAD(ttc);
  if(el('ft-tva-label')) el('ft-tva-label').textContent = `TVA (${tva}%):`;
}

function openMFacture(id) {
  _factureLignes = [];
  document.getElementById('mf-title').textContent = id?'Modifier la facture':'Nouvelle facture';
  document.getElementById('mf-id').value = id||'';
  document.getElementById('mf-statut-wrap').style.display = id?'block':'none';
  const sel=document.getElementById('mf-client');
  sel.innerHTML=_cachedClients.map(c=>`<option value="${c.id}">${c.prenom} ${c.nom} — ${c.entreprise||''}</option>`).join('');
  if (id) {
    const allF = DB.get('factures')||[];
    const f = allF.find(x=>String(x.id)===String(id))||{};
    sel.value = String(f.client_id)||'';
    document.getElementById('mf-echeance').value = f.date_echeance||'';
    document.getElementById('mf-notes').value    = f.notes||'';
    document.getElementById('mf-tva').value      = f.tva||20;
    document.getElementById('mf-statut').value   = f.statut||'En attente';
    _factureLignes = (f.lignes||[]).map(l=>({desc:l.description||l.desc||'',qte:parseFloat(l.quantite||l.qte||1),prix:parseFloat(l.prix_unitaire||l.prix||0)}));
  } else {
    document.getElementById('mf-echeance').value='';
    document.getElementById('mf-notes').value='';
    document.getElementById('mf-tva').value=20;
    addFactureLigne();
  }
  renderFactureLignes();
  openM('m-facture');
}

async function saveFacture() {
  const id        = document.getElementById('mf-id').value;
  const client_id = document.getElementById('mf-client').value;
  if (!client_id)          { toast('Sélectionnez un client','warn'); return; }
  if (!_factureLignes.length) { toast('Ajoutez au moins une ligne','warn'); return; }
  const tva      = parseFloat(document.getElementById('mf-tva').value||20);
  const ht       = _factureLignes.reduce((s,l)=>s+(l.qte*l.prix),0);
  const ttc      = ht*(1+tva/100);
  const lignes   = _factureLignes.map(l=>({description:l.desc,quantite:l.qte,prix_unitaire:l.prix,sous_total:l.qte*l.prix}));
  const data     = { client_id, date_echeance:document.getElementById('mf-echeance').value, notes:document.getElementById('mf-notes').value, tva, lignes,
    statut: id ? document.getElementById('mf-statut').value : 'En attente' };
  try {
    if (USE_BACKEND) {
      if (id) await api('PUT',`/factures/${id}`,data);
      else    await api('POST','/factures',data);
    } else {
      const rows=DB.get('factures')||[];
      const year=new Date().getFullYear();
      if (id) {
        const i=rows.findIndex(r=>String(r.id)===String(id));
        if(i!==-1){ rows[i]={...rows[i],...data,total_ht:ht,total_ttc:ttc,lignes:lignes.map(l=>({...l,description:l.description}))}; DB.set('factures',rows); }
      } else {
        const num=String(rows.filter(f=>f.numero&&f.numero.startsWith('FAC-'+year)).length+1).padStart(4,'0');
        rows.push({...data,id:'f'+Date.now(),numero:`FAC-${year}-${num}`,total_ht:ht,total_ttc:ttc,created_at:new Date().toISOString().slice(0,10),
          lignes:lignes.map(l=>({...l,description:l.description}))}); DB.set('factures',rows);
      }
    }
    toast(id?'Facture modifiée ✓':'Facture créée ✓','success');
    if(!id) addNotif('Nouvelle facture créée',`${fmtMAD(ttc)} TTC`);
    closeM('m-facture'); factures();
  } catch(e) { toast(e.message,'error'); }
}

async function delFacture(id) {
  if(!confirm('Supprimer cette facture ?')) return;
  try {
    if(USE_BACKEND) await api('DELETE',`/factures/${id}`);
    else { DB.set('factures',(DB.get('factures')||[]).filter(f=>String(f.id)!==String(id))); }
    toast('Facture supprimée','success'); factures();
  } catch(e) { toast(e.message,'error'); }
}

function printFacturePDF(id) {
  // Cherche la facture dans localStorage OU dans _cachedClients
  const allF = USE_BACKEND ? null : (DB.get('factures') || []);
  const f    = allF ? allF.find(x => String(x.id) === String(id)) : null;
 
  if (!f) {
    toast('Chargement de la facture...', 'warn');
    // Si backend: fetch puis génère
    if (USE_BACKEND) {
      api('GET', `/factures/${id}`).then(facture => {
        if (facture) _generateFacturePDF(facture);
        else toast('Facture introuvable', 'error');
      }).catch(() => toast('Erreur chargement facture', 'error'));
    } else {
      toast('Facture introuvable', 'error');
    }
    return;
  }
  _generateFacturePDF(f);
}
 
function _generateFacturePDF(f) {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { toast('jsPDF non chargé — vérifiez la connexion', 'error'); return; }
 
  const cl  = _cachedClients.find(c => String(c.id) === String(f.client_id)) || {};
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
 
  const W  = 210;
  const BRAND = [0, 119, 182];
  const BRAND2 = [0, 180, 216];
  const DARK   = [8, 15, 24];
  const GRAY   = [100, 120, 140];
  const LGRAY  = [230, 240, 250];
 
  // ── HEADER BACKGROUND ──────────────────────────────────────────────
  doc.setFillColor(...BRAND);
  doc.rect(0, 0, W, 50, 'F');
 
  // Accent stripe
  doc.setFillColor(...BRAND2);
  doc.rect(0, 47, W, 3, 'F');
 
  // Logo text
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(28);
  doc.setFont('helvetica', 'bold');
  doc.text('Web', 14, 22);
  doc.setTextColor(...BRAND2);
  doc.text('Marko', 14 + doc.getTextWidth('Web'), 22);
 
  doc.setTextColor(200, 230, 255);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text('AGENCE DIGITALE · WEBMARKO.MA', 14, 30);
  doc.text('contact@webmarko.ma  ·  +212 6XX XXX XXX', 14, 36);
 
  // FACTURE label (right)
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('FACTURE', W - 14, 22, { align: 'right' });
  doc.setFontSize(13);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(...BRAND2);
  doc.text(f.numero || '—', W - 14, 32, { align: 'right' });
 
  // ── STATUT BADGE ────────────────────────────────────────────────────
  const statutColors = {
    'Payée':      [34, 197, 94],
    'En attente': [245, 158, 11],
    'Annulée':    [239, 68, 68],
  };
  const sc = statutColors[f.statut] || GRAY;
  doc.setFillColor(...sc);
  doc.roundedRect(W - 55, 37, 40, 8, 2, 2, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text((f.statut || '').toUpperCase(), W - 35, 42.5, { align: 'center' });
 
  // ── SECTION: FACTURER À + DÉTAILS ──────────────────────────────────
  let y = 62;
 
  // Cadre client (gauche)
  doc.setFillColor(...LGRAY);
  doc.roundedRect(14, y, 88, 46, 3, 3, 'F');
  doc.setTextColor(...BRAND);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text('FACTURÉ À', 20, y + 8);
  doc.setDrawColor(...BRAND2);
  doc.setLineWidth(0.5);
  doc.line(20, y + 10, 96, y + 10);
 
  doc.setTextColor(...DARK);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text(`${cl.prenom || ''} ${cl.nom || ''}`, 20, y + 18);
 
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(...GRAY);
  if (cl.entreprise) doc.text(cl.entreprise, 20, y + 25);
  if (cl.email)      doc.text(cl.email,      20, y + 32);
  if (cl.tel)        doc.text(cl.tel,         20, y + 39);
  if (cl.ville)      doc.text(cl.ville,       20, y + 46);
 
  // Cadre info facture (droite)
  doc.setFillColor(...LGRAY);
  doc.roundedRect(108, y, 88, 46, 3, 3, 'F');
  doc.setTextColor(...BRAND);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text('DÉTAILS FACTURE', 114, y + 8);
  doc.setDrawColor(...BRAND2);
  doc.line(114, y + 10, 190, y + 10);
 
  const details = [
    ['Numéro',    f.numero || '—'],
    ['Date',      fmtDate(f.created_at)],
    ['Échéance',  fmtDate(f.date_echeance)],
    ['TVA',       `${f.tva || 20}%`],
  ];
  details.forEach((d, i) => {
    const dy = y + 18 + i * 7;
    doc.setTextColor(...GRAY); doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    doc.text(d[0] + ':', 114, dy);
    doc.setTextColor(...DARK); doc.setFont('helvetica', 'bold');
    doc.text(d[1], 190, dy, { align: 'right' });
  });
 
  // ── TABLEAU DES LIGNES ───────────────────────────────────────────────
  y += 56;
 
  const lignes = (f.lignes || []).map(l => [
    l.description || l.desc || '—',
    String(parseFloat(l.quantite || l.qte || 1)),
    fmtMAD(l.prix_unitaire || l.prix || 0),
    fmtMAD(l.sous_total || (parseFloat(l.quantite||l.qte||1) * parseFloat(l.prix_unitaire||l.prix||0)))
  ]);
 
  doc.autoTable({
    head: [['Description', 'Qté', 'Prix HT', 'Sous-total']],
    body: lignes.length ? lignes : [['Aucune ligne', '', '', '']],
    startY: y,
    margin: { left: 14, right: 14 },
    styles: {
      fontSize: 10,
      cellPadding: { top: 5, right: 8, bottom: 5, left: 8 },
      textColor: [...DARK],
      lineColor: [...LGRAY],
      lineWidth: 0.3,
    },
    headStyles: {
      fillColor: [...BRAND],
      textColor: [255, 255, 255],
      fontStyle: 'bold',
      fontSize: 9,
      cellPadding: { top: 6, right: 8, bottom: 6, left: 8 },
    },
    alternateRowStyles: { fillColor: [245, 250, 255] },
    columnStyles: {
      0: { cellWidth: 90 },
      1: { cellWidth: 20, halign: 'center' },
      2: { cellWidth: 35, halign: 'right' },
      3: { cellWidth: 37, halign: 'right', fontStyle: 'bold' },
    },
  });
 
  // ── TOTAUX ───────────────────────────────────────────────────────────
  const finalY = doc.lastAutoTable.finalY + 6;
  const tva    = parseFloat(f.tva || 20);
  const ht     = parseFloat(f.total_ht || 0);
  const tvaAmt = ht * tva / 100;
  const ttc    = parseFloat(f.total_ttc || 0);
 
  const totalsX = 120;
  const totalsW = 76;
 
  // Fond totaux
  doc.setFillColor(...LGRAY);
  doc.roundedRect(totalsX, finalY, totalsW, 36, 3, 3, 'F');
 
  doc.setFontSize(10);
  // Total HT
  doc.setFont('helvetica', 'normal'); doc.setTextColor(...GRAY);
  doc.text('Total HT :', totalsX + 6, finalY + 10);
  doc.setFont('helvetica', 'bold'); doc.setTextColor(...DARK);
  doc.text(fmtMAD(ht), totalsX + totalsW - 6, finalY + 10, { align: 'right' });
 
  // TVA
  doc.setFont('helvetica', 'normal'); doc.setTextColor(...GRAY);
  doc.text(`TVA (${tva}%) :`, totalsX + 6, finalY + 20);
  doc.setFont('helvetica', 'bold'); doc.setTextColor(...DARK);
  doc.text(fmtMAD(tvaAmt), totalsX + totalsW - 6, finalY + 20, { align: 'right' });
 
  // Séparateur
  doc.setDrawColor(...BRAND2); doc.setLineWidth(0.8);
  doc.line(totalsX + 4, finalY + 24, totalsX + totalsW - 4, finalY + 24);
 
  // Total TTC
  doc.setFillColor(...BRAND);
  doc.roundedRect(totalsX, finalY + 26, totalsW, 10, 2, 2, 'F');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
  doc.setTextColor(255, 255, 255);
  doc.text('Total TTC :', totalsX + 6, finalY + 33);
  doc.text(fmtMAD(ttc), totalsX + totalsW - 6, finalY + 33, { align: 'right' });
 
  // ── NOTES ────────────────────────────────────────────────────────────
  if (f.notes) {
    const notesY = finalY + 42;
    doc.setFillColor(255, 250, 235);
    doc.roundedRect(14, notesY, 100, 18, 3, 3, 'F');
    doc.setTextColor(...BRAND); doc.setFontSize(8); doc.setFont('helvetica', 'bold');
    doc.text('📝 NOTES', 20, notesY + 7);
    doc.setTextColor(...GRAY); doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    const wrapped = doc.splitTextToSize(f.notes, 90);
    doc.text(wrapped, 20, notesY + 14);
  }
 
  // ── FOOTER ───────────────────────────────────────────────────────────
  const pageH = doc.internal.pageSize.height;
  doc.setFillColor(...BRAND);
  doc.rect(0, pageH - 18, W, 18, 'F');
  doc.setTextColor(200, 230, 255); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
  doc.text('WebMarko · Agence Digitale · webmarko.ma', W / 2, pageH - 10, { align: 'center' });
  doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')}`, W / 2, pageH - 5, { align: 'center' });
 
  // ── SAVE ─────────────────────────────────────────────────────────────
  const filename = `${f.numero || 'facture'}.pdf`;
  doc.save(filename);
  toast(`✅ ${filename} téléchargé`, 'success');
}

async function exportCSV(type) {
  if (USE_BACKEND) {
    try {
      const res = await fetch(`${API_BASE}/export/${type}`, {
        headers: { 'Authorization': `Bearer ${JWT_TOKEN}` }
      });
      if (!res.ok) { toast('Erreur export', 'error'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${type}.csv`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      toast('Export CSV téléchargé ✓', 'success');
    } catch(e) { toast(e.message, 'error'); }
    return;
  }
  // localStorage fallback
  let rows=[]; let header=''; let filename=type+'.csv';
  if (type==='clients') {
    rows=DB.get('clients')||[];
    header='Prénom,Nom,Email,Téléphone,Ville,Entreprise,Secteur,Date\n';
    const csv=rows.map(c=>`"${c.prenom}","${c.nom}","${c.email}","${c.tel||''}","${c.ville||''}","${c.entreprise||''}","${c.secteur||''}","${c.created_at||''}"`).join('\n');
    downloadCSV(header+csv, filename);
  } else if (type==='reclamations') {
    rows=DB.get('reclamations')||[];
    header='Sujet,Type,Statut,Priorité,Date\n';
    const csv=rows.map(r=>`"${r.sujet}","${r.type||''}","${r.statut}","${r.priorite}","${r.created_at||''}"`).join('\n');
    downloadCSV(header+csv, filename);
  } else if (type==='factures') {
    rows=DB.get('factures')||[];
    header='Numéro,Statut,Total HT,TVA%,Total TTC,Échéance\n';
    const csv=rows.map(f=>`"${f.numero}","${f.statut}","${f.total_ht}","${f.tva}","${f.total_ttc}","${f.date_echeance||''}"`).join('\n');
    downloadCSV(header+csv, filename);
  }
}

function downloadCSV(content, filename) {
  const blob=new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Export CSV téléchargé ✓','success');
}

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const d=chartDefaults();

async function clientStats() {

    getRecs({client_id:String(c.id)}),

  ]);
  const total = myRecs.length;
  const resolved = myRecs.filter(r=>r.statut==='Résolu').length;
  const rate = total ? Math.round(resolved/total*100) : 0;
  const totalPaid = myFactures.filter(f=>f.statut==='Payée').reduce((s,f)=>s+parseFloat(f.total_ttc||0),0);
  const totalAtt  = myFactures.filter(f=>f.statut==='En attente').reduce((s,f)=>s+parseFloat(f.total_ttc||0),0);

  for (let i=5; i>=0; i--) {
    const d = new Date(); d.setMonth(d.getMonth()-i);

  myRecs.forEach(r => {
    const d = new Date(r.created_at); if(isNaN(d)) return;
    const k = d.toLocaleString('fr-FR',{month:'short',year:'2-digit'});

    <div class="pro-banner">
      <div class="pro-banner-icon">📊</div>

      <div class="stat-card" style="--color:var(--green)"><div class="stat-label">Total payé</div><div class="stat-val" style="font-size:18px">${fmtMAD(totalPaid)}</div><div class="stat-sub">${myFactures.filter(f=>f.statut==='Payée').length} factures</div><div class="stat-icon-bg">💳</div></div>
      <div class="stat-card" style="--color:var(--amber)"><div class="stat-label">En attente paiement</div><div class="stat-val" style="font-size:18px">${fmtMAD(totalAtt)}</div><div class="stat-sub">${myFactures.filter(f=>f.statut==='En attente').length} factures</div><div class="stat-icon-bg">⏳</div></div>
    </div>
    <div class="cols-2" style="margin-bottom:18px">
      <div class="chart-card"><div class="chart-title">📈 Réclamations sur 6 mois</div><div style="height:200px"><canvas id="ch-my-recs"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">🥧 Types de réclamations</div><div style="height:200px"><canvas id="ch-my-types"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-hd"><span class="card-title">🌐 Mes sites — Vue globale</span></div>
      <div class="card-bd"><div style="display:flex;gap:16px;flex-wrap:wrap">
        ${mySites.map(s=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 18px;min-width:200px"><div style="font-weight:700;margin-bottom:6px">${s.nom||'—'}</div><div style="display:flex;gap:8px;align-items:center">${badgeSt(s.statut)}<span class="badge b-blue">${s.type||'—'}</span></div></div>`).join('')||emptyState('🌐','Aucun site','—')}
      </div></div>
    </div>`;

    const typeKeys = Object.keys(types);

async function clientMessages() {
  const c = currentUser._client || {};
  const key = `chat_${c.id||'guest'}`;
  let msgs = JSON.parse(localStorage.getItem(key) || '[]');
  if (!msgs.length) {
    msgs = [{ id:'m0', from:'admin', text:'Bonjour ! 👋 Bienvenue sur votre messagerie WebMarko. Comment pouvons-nous vous aider ?', ts: Date.now()-3600000 }];
    localStorage.setItem(key, JSON.stringify(msgs));
  }
  const renderMsgs = () => msgs.map(m => {
    const isMe = m.from==='client';
    const t = new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    return `<div>${!isMe?`<div class="chat-sender">🛠️ WebMarko</div>`:''}<div class="chat-bubble ${isMe?'me':'them'}">${m.text}<span class="chat-time">${t}</span></div></div>`;
  }).join('');
  document.getElementById('page-content').innerHTML = `
    <div class="pro-banner"><div class="pro-banner-icon">💬</div><div class="pro-banner-text"><h3>Messagerie directe ✦ Pro</h3><p>Communiquez directement avec l'équipe WebMarko</p></div></div>
    <div class="chat-wrap">
      <div class="chat-messages" id="chat-msgs">${renderMsgs()}</div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-in" placeholder="Tapez votre message..." onkeydown="if(event.key==='Enter')sendChatMsg()">
        <button class="btn btn-primary" onclick="sendChatMsg()">Envoyer ✉️</button>
      </div>
    </div>`;
  const box = document.getElementById('chat-msgs');
  if (box) box.scrollTop = box.scrollHeight;
  window._chatKey = key; window._chatMsgs = msgs;
  window.sendChatMsg = function() {
    const inp = document.getElementById('chat-in');
    const text = (inp.value||'').trim(); if(!text) return;
    const m = { id:'m'+Date.now(), from:'client', text, ts:Date.now() };
    window._chatMsgs.push(m);
    localStorage.setItem(window._chatKey, JSON.stringify(window._chatMsgs));
    inp.value = '';
    const b = document.getElementById('chat-msgs');
    if (b) { b.innerHTML+=`<div><div class="chat-bubble me">${text}<span class="chat-time">${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></div></div>`; b.scrollTop=b.scrollHeight; }
    const replies = ['Merci pour votre message ! Nous allons traiter votre demande sous 24h. 🙏','Bien reçu ! Notre équipe technique a été notifiée. ✅','Nous avons pris note. Un technicien vous contactera rapidement. 🔧','Merci ! Pour les urgences, utilisez le formulaire de réclamation. ⚡'];
    setTimeout(()=>{
      const rep = replies[Math.floor(Math.random()*replies.length)];
      const rm = { id:'m'+Date.now(), from:'admin', text:rep, ts:Date.now() };
      window._chatMsgs.push(rm);
      localStorage.setItem(window._chatKey, JSON.stringify(window._chatMsgs));
      const b2=document.getElementById('chat-msgs');
      if(b2){b2.innerHTML+=`<div><div class="chat-sender">🛠️ WebMarko</div><div class="chat-bubble them">${rep}<span class="chat-time">${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></div></div>`;b2.scrollTop=b2.scrollHeight;}
      addNotif('Nouveau message WebMarko', rep.slice(0,50));
    },1500);
  };
}

              </div>`}
          </div>`;
        }).join('') : emptyState('🎉','Aucun ticket résolu','Vos tickets résolus apparaîtront ici.')}
      </div>
      <div>
        <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text2)">📊 Résumé de vos évaluations</h3>
        <div class="card"><div class="card-bd">
          ${(()=>{
            const rated=Object.values(savedRatings);
            if(!rated.length) return emptyState('⭐','Aucune évaluation','Notez vos tickets résolus !');
            const avg=(rated.reduce((s,r)=>s+r.stars,0)/rated.length).toFixed(1);
            return `<div style="text-align:center;padding:20px 0"><div style="font-size:48px;font-weight:800;color:var(--amber)">${avg}</div><div style="font-size:20px;margin:8px 0">${'⭐'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))}</div><div style="font-size:13px;color:var(--text2)">${rated.length} évaluation${rated.length>1?'s':''}</div></div>
            <div style="border-top:1px solid var(--border);padding-top:16px">${[5,4,3,2,1].map(n=>{const cnt=rated.filter(r=>r.stars===n).length;const pct=rated.length?Math.round(cnt/rated.length*100):0;return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:12px;width:14px">${n}</span><span style="font-size:12px">⭐</span><div style="flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--amber);border-radius:4px"></div></div><span style="font-size:11px;color:var(--text3);width:24px">${cnt}</span></div>`;}).join('')}</div>`;
          })()}
        </div></div>
      </div>
    </div>`;
  window._savedRatings=savedRatings; window._ratingKey=rKey;
  window.rateRec=function(recId,stars){ for(let i=1;i<=5;i++){const s=document.getElementById(`star-${recId}-${i}`);if(s)s.classList.toggle('active',i<=stars);} const cw=document.getElementById(`comment-wrap-${recId}`);if(cw)cw.style.display='block'; window._currentStars=window._currentStars||{}; window._currentStars[recId]=stars; };
  window.submitRating=function(recId){ const stars=(window._currentStars||{})[recId]; if(!stars){toast('Sélectionnez une note','warn');return;} const comment=(document.getElementById(`comment-${recId}`)?.value||'').trim(); window._savedRatings[recId]={stars,comment,ts:Date.now()}; localStorage.setItem(window._ratingKey,JSON.stringify(window._savedRatings)); toast('Évaluation envoyée ! Merci 🙏','success'); addNotif('Évaluation reçue ⭐',`${stars} étoile${stars>1?'s':''}— Merci !`); clientRatings(); };
}

// =====================================================================
// ✦ PRO FEATURE 5 — CENTRE DE NOTIFICATIONS PRO
// =====================================================================
async function clientProNotifs() {
  const c = currentUser._client || {};
  const [myRecs, myF] = await Promise.all([getRecs({client_id:String(c.id)}), getFactures({client_id:String(c.id)})]);
  const nKey = `pro_notifs_${c.id||'guest'}`;
  let proNotifs = JSON.parse(localStorage.getItem(nKey)||'null');
  if (!proNotifs) proNotifs = [{ id:'pn0', type:'welcome', icon:'🎉', color:'var(--brand-2)', title:'Bienvenue sur votre espace Pro !', sub:'Profitez de toutes les fonctionnalités avancées WebMarko.', ts:Date.now()-7200000, read:true }];
  myRecs.filter(r=>r.priorite==='Urgente'&&r.statut!=='Résolu').forEach(r=>{ if(!proNotifs.find(n=>n.id==='rec_'+r.id)) proNotifs.unshift({id:'rec_'+r.id,type:'alert',icon:'🚨',color:'var(--red)',title:'Réclamation urgente en attente',sub:`"${r.sujet}" — Priorité urgente`,ts:new Date(r.created_at).getTime()||Date.now(),read:false}); });
  myF.filter(f=>f.statut==='En attente').forEach(f=>{ if(!proNotifs.find(n=>n.id==='fac_'+f.id)) proNotifs.unshift({id:'fac_'+f.id,type:'invoice',icon:'💰',color:'var(--amber)',title:`Facture ${f.numero} en attente`,sub:`Montant : ${fmtMAD(f.total_ttc)} · Échéance : ${fmtDate(f.date_echeance)}`,ts:new Date(f.created_at).getTime()||Date.now(),read:false}); });
  localStorage.setItem(nKey, JSON.stringify(proNotifs.slice(0,30)));
  const unread = proNotifs.filter(n=>!n.read).length;
  const renderItem = n => `<div class="notif-pro-item ${n.read?'':'unread'}" id="pni-${n.id}" onclick="readProNotif('${n.id}')">
    <div class="notif-pro-icon" style="background:${n.color}22">${n.icon}</div>
    <div class="notif-pro-body"><div class="notif-pro-title">${n.title}</div><div class="notif-pro-sub">${n.sub}</div><div class="notif-pro-time">${new Date(n.ts).toLocaleString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>
    ${!n.read?`<div style="width:8px;height:8px;border-radius:50%;background:var(--brand-2);flex-shrink:0;margin-top:4px"></div>`:''}
  </div>`;
  document.getElementById('page-content').innerHTML = `
    <div class="pro-banner">
      <div class="pro-banner-icon">🔔</div>
      <div class="pro-banner-text"><h3>Centre de notifications ✦ Pro</h3><p>${unread>0?`<span style="color:#f59e0b;font-weight:700">${unread} notification${unread>1?'s':''} non lue${unread>1?'s':''}</span>`:'Tout est à jour ✅'}</p></div>
      ${unread>0?`<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="markAllProRead()">Tout marquer lu</button>`:''}
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      ${['Tout','Alertes','Factures','Messages'].map(t=>`<button onclick="filterProNotifs('${t}')" class="btn btn-ghost btn-sm pro-notif-filter ${t==='Tout'?'active-filter':''}" id="pnf-${t}">${t}</button>`).join('')}
    </div>
    <div class="card" id="pro-notif-list">${proNotifs.length?proNotifs.map(renderItem).join(''):emptyState('🎉','Aucune notification','Tout est à jour !')}</div>`;
  window._proNotifs=proNotifs; window._proNotifsKey=nKey; window._renderPNItem=renderItem;
  window.readProNotif=function(id){ const n=window._proNotifs.find(x=>x.id===id); if(n&&!n.read){n.read=true;localStorage.setItem(window._proNotifsKey,JSON.stringify(window._proNotifs));} const el=document.getElementById('pni-'+id); if(el){el.classList.remove('unread');el.querySelector('[style*="border-radius:50%"]')?.remove();} };
  window.markAllProRead=function(){ window._proNotifs.forEach(n=>n.read=true); localStorage.setItem(window._proNotifsKey,JSON.stringify(window._proNotifs)); toast('Toutes les notifications sont lues ✓','success'); clientProNotifs(); };
  window.filterProNotifs=function(type){ document.querySelectorAll('.pro-notif-filter').forEach(b=>b.classList.remove('active-filter')); document.getElementById('pnf-'+type)?.classList.add('active-filter'); const list=document.getElementById('pro-notif-list'); if(!list) return; const typeMap={Alertes:'alert',Factures:'invoice',Messages:'chat'}; const filtered=type==='Tout'?window._proNotifs:window._proNotifs.filter(n=>n.type===typeMap[type]); list.innerHTML=filtered.length?filtered.map(window._renderPNItem).join(''):emptyState('🔔','Aucune notification dans cette catégorie',''); };
}

  const s=document.createElement('style');
  s.textContent=`.active-filter{background:linear-gradient(135deg,var(--brand-1),var(--brand-2))!important;color:#fff!important;border-color:transparent!important;} .pro-banner{display:flex;align-items:center;}`;
  document.head.appendChild(s);
})();

initLocalData();
